services:
  db:
    image: postgres:16-alpine
    container_name: hausofestate-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-johndoe}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-randompassword}
      POSTGRES_DB: ${DB_NAME:-mydb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-johndoe} -d ${DB_NAME:-mydb}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hausofestate-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER:-johndoe}:${DB_PASSWORD:-randompassword}@db:5432/${DB_NAME:-mydb}?schema=public
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-changeme}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: